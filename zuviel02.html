<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Überflüssiges löschen</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --card: #ffffff;
            --primary: #0984e3;
            --success: #27ae60;
            --error: #d63031;
            --text: #2d3436;
            --gray: #dfe6e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--gray);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        h1 { font-size: 1.5rem; color: var(--primary); margin: 0 0 10px 0; }
        .instruction { color: #636e72; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.4; }

        /* Wort-Fläche */
        .sentence-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .word-btn {
            font-size: 1.4rem;
            font-weight: 500;
            padding: 10px 15px;
            background: white;
            border: 2px solid var(--gray);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }

        .word-btn:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .word-btn.deleted {
            text-decoration: line-through;
            opacity: 0.3;
            background: #eee;
        }

        .word-btn.correct-deleted {
            border-color: var(--success);
            color: var(--success);
            background: #e8f8f0;
        }

        .word-btn.wrong-deleted {
            border-color: var(--error);
            color: var(--error);
            background: #fdf2f2;
        }

        /* Feedback */
        #feedback {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .fb-success { background: #e8f8f0; border-left: 5px solid var(--success); }
        .fb-error { background: #fdf2f2; border-left: 5px solid var(--error); }

        .btn-action {
            margin-top: 15px;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        #result-screen { display: none; }

        @media (max-width: 480px) {
            .word-btn { font-size: 1.1rem; padding: 8px 12px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-ui">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h1>Überflüssiges löschen</h1>
    <p class="instruction">In diesem Satz ist ein Wort zu viel. Klicke auf das Wort, das gelöscht werden muss, damit der Satz natürlich klingt.</p>

    <div class="sentence-display" id="sentence-container">
        <!-- Wörter werden hier generiert -->
    </div>

    <div id="feedback">
        <strong id="fb-status" style="font-size: 1.1rem;"></strong>
        <p id="fb-text" style="margin: 10px 0 0 0; line-height: 1.5; font-size: 0.95rem;"></p>
        <button class="btn-action" onclick="nextQuestion()">Nächste Aufgabe</button>
    </div>
</div>

<div class="container" id="result-screen">
    <h2>Training abgeschlossen!</h2>
    <p id="score-text" style="font-size: 1.3rem; margin: 25px 0;"></p>
    <button class="btn-action" onclick="restart()">Erneut starten</button>
</div>

<script>
    const questions = [
        {
            words: ["Здравствуйте,", "добрый", "вечер!"],
            redundantIndices: [0, 1, 2], // Spezieller Fall: Entweder 0 oder (1 und 2) löschen. 
            // Vereinfachen wir für die Logik: Klicke auf eines, das weg kann.
            correctIndices: [0, 1], // In diesem Beispiel löschen wir eines der Begrüßungsteile
            validDeletions: [0, 1], 
            explanation: "Ira erklärt: Wir nutzen nur eine Begrüßung. Entweder Здравствуйте oder Добрый вечер. Beides zusammen ist zu viel."
        },
        {
            words: ["Очень", "большое", "спасибо!"],
            correctIndices: [0], 
            explanation: "Die Kombination sehr + danke (очень спасибо) gibt es nicht. Большое спасибо reicht völlig aus."
        },
        {
            words: ["Моя", "китайская", "подруга-китаянка."],
            correctIndices: [1], 
            explanation: "Das Wort китайская ist hier überflüssig, da подруга-китаянка bereits aussagt, dass sie Chinesin ist."
        },
        {
            words: ["Я", "очень", "сильно", "много", "люблю", "это."],
            correctIndices: [3], 
            explanation: "Gefühle verstärken wir mit очень oder сильно. Das Wort много (viel) ist hier falsch und überflüssig."
        },
        {
            words: ["Не", "могли", "бы", "бы", "вы", "помочь?"],
            correctIndices: [2, 3], 
            explanation: "Bei einer höflichen Bitte verwenden wir die Partikel бы nur einmal."
        },
        {
            words: ["По-русски", "на", "русском", "языке."],
            correctIndices: [0, 1, 2, 3], // Man kann entweder Teil 1 oder Teil 2 löschen
            validDeletions: [0, 1, 2, 3],
            explanation: "Nutze entweder по-русски oder на русском языке. Beides hintereinander ist redundant."
        },
        {
            words: ["Здравствуйте,", "привет!"],
            correctIndices: [0, 1], 
            explanation: "Wähle eine Begrüßung. Eine Kombination aus förmlich und informell direkt hintereinander ist unnatürlich."
        },
        {
            words: ["Я", "ничего", "не", "не", "знаю."],
            correctIndices: [3], 
            explanation: "Die doppelte Verneinung besteht aus nichts (ничего) und einer Partikel не. Ein zweites не ist zu viel."
        },
        {
            words: ["В", "эти", "на", "этих", "выходных."],
            correctIndices: [0, 1, 2, 3], 
            explanation: "Mische nicht die Stile. Entscheide dich für в эти выходные (neutral) oder на этих выходных (umgangssprachlich)."
        },
        {
            words: ["Большое", "огромное", "спасибо!"],
            correctIndices: [0, 1], 
            explanation: "Ein Verstärker reicht. Nutze entweder большое oder огромное, um dich zu bedanken."
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    let currentQuestions = [];

    function initQuiz() {
        currentQuestions = shuffle([...questions]);
        currentIdx = 0;
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('sentence-container');
        container.innerHTML = '';
        
        document.getElementById('feedback').style.display = 'none';

        q.words.forEach((word, idx) => {
            const btn = document.createElement('button');
            btn.className = 'word-btn';
            btn.innerText = word;
            btn.onclick = () => handleDeletion(idx, btn);
            container.appendChild(btn);
        });
        
        updateProgress();
    }

    function handleDeletion(idx, btn) {
        if (answered) return;
        answered = true;

        const q = currentQuestions[currentIdx];
        const isCorrect = q.correctIndices.includes(idx);
        const feedback = document.getElementById('feedback');
        const fbStatus = document.getElementById('fb-status');
        const fbText = document.getElementById('fb-text');

        const allBtns = document.querySelectorAll('.word-btn');
        allBtns.forEach(b => b.disabled = true);

        if (isCorrect) {
            score++;
            fbStatus.innerText = "Richtig gelöscht!";
            fbStatus.style.color = "var(--success)";
            feedback.className = "fb-success";
            btn.classList.add('correct-deleted', 'deleted');
        } else {
            fbStatus.innerText = "Das war nicht überflüssig.";
            fbStatus.style.color = "var(--error)";
            feedback.className = "fb-error";
            btn.classList.add('wrong-deleted');
            // Markiere ein korrektes Wort zum Löschen als Hilfe
            allBtns[q.correctIndices[0]].classList.add('correct-deleted', 'deleted');
        }

        fbText.innerText = q.explanation;
        feedback.style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < currentQuestions.length) {
            loadQuestion();
        } else {
            showFinal();
        }
    }

    function updateProgress() {
        const percent = (currentIdx / currentQuestions.length) * 100;
        document.getElementById('progress-fill').style.width = percent + '%';
    }

    function showFinal() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = `Du hast ${score} von ${currentQuestions.length} Redundanzen korrekt erkannt!`;
    }

    function restart() {
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        initQuiz();
    }

    initQuiz();
</script>

</body>
</html>
