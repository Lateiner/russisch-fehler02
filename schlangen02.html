<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Wortschlangen mit Lösungshilfe</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --primary: #0984e3;
            --secondary: #dfe6e9;
            --success: #27ae60;
            --error: #d63031;
            --text: #2d3436;
            --accent: #6c5ce7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            box-sizing: border-box;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--secondary);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        h1 { font-size: 1.4rem; color: var(--primary); margin: 0 0 10px 0; }
        .instruction { color: #636e72; font-size: 0.95rem; margin-bottom: 20px; }

        /* Bereich für den aufgebauten Satz */
        .sentence-build-area {
            min-height: 110px;
            background: #fdfdfd;
            border: 2px dashed var(--primary);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 10px;
        }

        /* Bereich für die verfügbaren Wörter */
        .word-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            min-height: 60px;
        }

        /* Kachel-Design */
        .tile {
            padding: 10px 15px;
            background: white;
            border: 2px solid var(--primary);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.2s;
            user-select: none;
        }

        .tile:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .tile.in-sentence { background: var(--primary); color: white; border-color: var(--primary); }

        /* Steuerung */
        .controls { display: flex; flex-direction: column; gap: 10px; }

        .btn-action {
            padding: 15px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn-solution {
            padding: 10px;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-solution:hover { background: var(--accent); color: white; }

        /* Feedback */
        #feedback-area {
            display: none;
            margin-top: 15px;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .fb-success { background: #e8f8f0; border-left: 5px solid var(--success); color: #1e8449; }
        .fb-error { background: #fdf2f2; border-left: 5px solid var(--error); color: #a93226; }
        .fb-hint { background: #f3f0ff; border-left: 5px solid var(--accent); color: #5f27cd; }

        #result-screen { display: none; }

        @media (max-width: 480px) {
            .tile { font-size: 0.95rem; padding: 8px 12px; }
            .container { padding: 15px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-ui">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h1>Satzbau-Trainer</h1>
    <p class="instruction">Tippe die Wörter an, um den Satz zu bilden.</p>

    <div class="sentence-build-area" id="sentence-area"></div>
    <div class="word-pool" id="pool-area"></div>

    <div class="controls" id="quiz-controls">
        <button class="btn-solution" id="solution-btn" onclick="showSolution()">Lösung anzeigen</button>
    </div>

    <div id="feedback-area">
        <strong id="fb-status"></strong>
        <p id="fb-explanation" style="margin: 8px 0 0 0; line-height: 1.5; font-size: 0.95rem;"></p>
        <button class="btn-action" onclick="nextQuestion()">Nächste Aufgabe</button>
    </div>
</div>

<div class="container" id="result-screen">
    <h2>Ergebnis</h2>
    <p id="score-text" style="font-size: 1.3rem; margin: 25px 0;"></p>
    <button class="btn-action" onclick="restart()">Neustart</button>
</div>

<script>
    const questions = [
        {
            correct: ["Если", "бы", "я", "выиграла", "миллион,", "я", "купила", "бы", "самолёт."],
            scrambled: ["я", "бы", "самолёт.", "купила", "выиграла", "я", "бы", "Если", "миллион,"],
            explanation: "In irrealen Bedingungen (Wenn-Dann) muss das Wort бы in beiden Satzteilen verwendet werden."
        },
        {
            correct: ["Большое", "спасибо", "за", "ваше", "видео!"],
            scrambled: ["видео!", "за", "ваше", "спасибо", "Большое"],
            explanation: "Wir nutzen das sächliche Adjektiv (большое) und die Präposition за + Akkusativ für den Grund des Dankes."
        },
        {
            correct: ["Я", "ничего", "не", "слышал", "об", "этом."],
            scrambled: ["не", "слышал", "ничего", "этом.", "об", "Я"],
            explanation: "Im Russischen ist die doppelte Verneinung Pflicht: nichts (ничего) + nicht (не)."
        },
        {
            correct: ["Ирина,", "вы", "очень", "умная."],
            scrambled: ["умная.", "вы", "Ирина,", "очень"],
            explanation: "Bei der höflichen Anrede einer einzelnen Frau (вы) steht das Adjektiv im Singular."
        },
        {
            correct: ["Ирина,", "вы", "уже", "пришли?"],
            scrambled: ["пришли?", "уже", "вы", "Ирина,"],
            explanation: "Verben stehen nach der Anrede mit вы immer im Plural, auch wenn nur eine Person gemeint ist."
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let userSentence = [];
    let poolWords = [];
    let solutionViewed = false;

    function initQuestion() {
        const q = questions[currentIdx];
        userSentence = [];
        poolWords = [...q.scrambled];
        solutionViewed = false;
        
        document.getElementById('feedback-area').style.display = 'none';
        document.getElementById('quiz-controls').style.display = 'block';
        render();
        updateProgress();
    }

    function render() {
        const sentenceArea = document.getElementById('sentence-area');
        const poolArea = document.getElementById('pool-area');
        
        sentenceArea.innerHTML = '';
        poolArea.innerHTML = '';

        userSentence.forEach((word, idx) => {
            const tile = document.createElement('div');
            tile.className = 'tile in-sentence';
            tile.innerText = word;
            tile.onclick = () => moveToPool(idx);
            sentenceArea.appendChild(tile);
        });

        poolWords.forEach((word, idx) => {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = word;
            tile.onclick = () => moveToSentence(idx);
            poolArea.appendChild(tile);
        });

        if (poolWords.length === 0 && userSentence.length > 0 && !solutionViewed) {
            checkAnswer();
        }
    }

    function moveToSentence(idx) {
        if (solutionViewed) return;
        const word = poolWords.splice(idx, 1)[0];
        userSentence.push(word);
        render();
    }

    function moveToPool(idx) {
        if (solutionViewed) return;
        const word = userSentence.splice(idx, 1)[0];
        poolWords.push(word);
        render();
    }

    function showSolution() {
        solutionViewed = true;
        const q = questions[currentIdx];
        userSentence = [...q.correct];
        poolWords = [];
        render();

        const fbArea = document.getElementById('feedback-area');
        document.getElementById('fb-status').innerText = "Hier ist die Lösung:";
        document.getElementById('fb-explanation').innerText = q.explanation;
        fbArea.className = "fb-hint";
        fbArea.style.display = 'block';
        document.getElementById('quiz-controls').style.display = 'none';
    }

    function checkAnswer() {
        const q = questions[currentIdx];
        const fbArea = document.getElementById('feedback-area');
        const status = document.getElementById('fb-status');
        const expl = document.getElementById('fb-explanation');

        const isCorrect = JSON.stringify(userSentence) === JSON.stringify(q.correct);

        if (isCorrect) {
            score++;
            status.innerText = "Richtig!";
            fbArea.className = "fb-success";
        } else {
            status.innerText = "Noch nicht ganz richtig.";
            fbArea.className = "fb-error";
        }

        expl.innerText = q.explanation;
        fbArea.style.display = 'block';
        document.getElementById('quiz-controls').style.display = 'none';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            initQuestion();
        } else {
            showFinal();
        }
    }

    function updateProgress() {
        document.getElementById('progress-fill').style.width = (currentIdx / questions.length) * 100 + '%';
    }

    function showFinal() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = `Du hast ${score} von ${questions.length} Sätzen eigenständig gelöst!`;
    }

    function restart() {
        currentIdx = 0; score = 0;
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        initQuestion();
    }

    initQuestion();
</script>

</body>
</html>
