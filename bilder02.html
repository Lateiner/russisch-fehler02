<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Höflichkeitsform</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --blue: #0984e3;
            --green: #27ae60;
            --red: #d63031;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #dfe6e9;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--blue);
            transition: width 0.3s ease;
        }

        .image-container {
            width: 100%;
            height: 180px;
            background: #fdfdfd;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #f1f1f1;
        }

        .image-container svg {
            height: 120px;
            width: auto;
        }

        h1 { font-size: 1.4rem; color: var(--blue); margin: 0 0 10px 0; }
        .instruction { color: #636e72; margin-bottom: 25px; font-size: 0.95rem; }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            background: white;
            border: 2px solid #dfe6e9;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .choice-btn:hover { border-color: var(--blue); background: #f0f7ff; }

        .choice-btn.correct { background: #e8f8f0; border-color: var(--green); color: #1e8449; }
        .choice-btn.wrong { background: #fdf2f2; border-color: var(--red); color: #a93226; }

        #feedback-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .fb-correct { background: #e8f8f0; border-left: 5px solid var(--green); }
        .fb-wrong { background: #fdf2f2; border-left: 5px solid var(--red); }

        .btn-next, .btn-restart {
            margin-top: 15px;
            padding: 12px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }

        #result-screen { display: none; }
    </style>
</head>
<body>

<div class="container" id="quiz-box">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h1 id="title">Wer ist gemeint?</h1>
    <p class="instruction">Wähle die grammatikalisch richtige Anrede für das Bild.</p>

    <div class="image-container" id="image-display">
        <!-- SVG Grafik wird hier eingefügt -->
    </div>

    <div class="button-stack" id="btn-container">
        <!-- Buttons werden hier eingefügt -->
    </div>

    <div id="feedback-box">
        <strong id="fb-status"></strong>
        <p id="fb-text" style="margin: 5px 0 0 0; font-size: 0.9rem; line-height: 1.4;"></p>
        <button class="btn-next" onclick="nextQuestion()">Nächste Aufgabe</button>
    </div>
</div>

<div class="container" id="result-screen">
    <h2>Training beendet!</h2>
    <p id="score-text" style="font-size: 1.2rem; margin: 20px 0;"></p>
    <button class="btn-restart" onclick="restartQuiz()">Neustart</button>
</div>

<script>
    // SVG Templates
    const iconSingle = `<svg viewBox="0 0 100 100"><circle cx="50" cy="35" r="20" fill="#3498db"/><path d="M50 60c-15 0-25 10-25 25h50c0-15-10-25-25-25z" fill="#3498db"/></svg>`;
    const iconGroup = `<svg viewBox="0 0 100 100"><circle cx="30" cy="40" r="15" fill="#95a5a6"/><path d="M30 60c-10 0-15 5-15 15h30c0-10-5-15-15-15z" fill="#95a5a6"/><circle cx="70" cy="40" r="15" fill="#95a5a6"/><path d="M70 60c-10 0-15 5-15 15h30c0-10-5-15-15-15z" fill="#95a5a6"/><circle cx="50" cy="35" r="15" fill="#34495e"/><path d="M50 55c-10 0-18 8-18 18h36c0-10-8-18-18-18z" fill="#34495e"/></svg>`;

    const questions = [
        {
            type: "single",
            options: ["Вы умная", "Вы умные"],
            correct: 0,
            explanation: "Richtig! Wenn Sie eine einzelne Person höflich mit вы ansprechen, bleibt das Adjektiv im Singular (умная)."
        },
        {
            type: "group",
            options: ["Вы умная", "Вы umные"],
            options: ["Вы умная", "Вы умные"],
            correct: 1,
            explanation: "Genau. Hier sprechen Sie mehrere Personen an, daher muss das Adjektiv im Plural stehen (умные)."
        },
        {
            type: "single",
            options: ["Вы пришли", "Вы пришла"],
            correct: 0,
            explanation: "Richtig! Achtung: Bei Verben nutzt man nach вы immer den Plural, auch wenn man nur eine Person höflich anspricht."
        },
        {
            type: "single",
            options: ["Вы здесь одна?", "Вы hier одни?"],
            options: ["Вы hier одна?", "Вы здесь одни?"],
            options: ["Вы здесь одна?", "Вы здесь одни?"],
            correct: 0,
            explanation: "Korrekt. Wie bei Adjektiven nutzen wir für einzelne Personen im höflichen вы die Einzahl (одна)."
        },
        {
            type: "group",
            options: ["Вы здесь одна?", "Вы hier одни?"],
            options: ["Вы здесь одна?", "Вы здесь одни?"],
            correct: 1,
            explanation: "Richtig. Bei einer Gruppe ist nur der Plural (одни) möglich."
        },
        {
            type: "single",
            options: ["Вы устали?", "Вы устала?"],
            correct: 0,
            explanation: "Richtig! Da устали ein Verb (Vergangenheitsform) ist, wird zwingend der Plural verwendet."
        },
        {
            type: "single",
            options: ["Вы красивая", "Вы красивые"],
            correct: 0,
            explanation: "Korrekt. Höfliche Anrede einer Frau: Einzahl des Adjektivs."
        },
        {
            type: "group",
            options: ["Вы красивая", "Вы красивые"],
            correct: 1,
            explanation: "Korrekt. Anrede einer Gruppe: Mehrzahl des Adjektivs."
        },
        {
            type: "single",
            options: ["Вы готовы?", "Вы готова?"],
            correct: 0,
            explanation: "Gut aufgepasst! Das Wort готов (bereit) verhält sich wie ein Adjektiv/Partizip. In der höflichen Form wird hier oft der Plural genutzt, aber nach Iras Regel für Verben/Zustände ist der Plural hier Standard."
        },
        {
            type: "single",
            options: ["Вы такая добрая", "Вы такие добрые"],
            correct: 0,
            explanation: "Richtig. Anrede einer einzelnen Frau: Singular."
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        const q = questions[currentIdx];
        document.getElementById('image-display').innerHTML = q.type === "single" ? iconSingle : iconGroup;
        document.getElementById('feedback-box').style.display = 'none';
        
        const btnContainer = document.getElementById('btn-container');
        btnContainer.innerHTML = '';
        
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx);
            btnContainer.appendChild(btn);
        });

        updateProgress();
    }

    function checkAnswer(idx) {
        if (answered) return;
        answered = true;

        const q = questions[currentIdx];
        const buttons = document.querySelectorAll('.choice-btn');
        const fbBox = document.getElementById('feedback-box');
        
        if (idx === q.correct) {
            score++;
            buttons[idx].classList.add('correct');
            document.getElementById('fb-status').innerText = "Richtig!";
            fbBox.className = "fb-correct";
        } else {
            buttons[idx].classList.add('wrong');
            buttons[q.correct].classList.add('correct');
            document.getElementById('fb-status').innerText = "Nicht ganz.";
            fbBox.className = "fb-wrong";
        }

        document.getElementById('fb-text').innerText = q.explanation;
        fbBox.style.display = 'block';
        fbBox.scrollIntoView({ behavior: 'smooth' });
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showFinal();
        }
    }

    function updateProgress() {
        const percent = (currentIdx / questions.length) * 100;
        document.getElementById('progress-fill').style.width = percent + '%';
    }

    function showFinal() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = `Du hast ${score} von ${questions.length} Punkten erreicht!`;
    }

    function restartQuiz() {
        currentIdx = 0;
        score = 0;
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        loadQuestion();
    }

    loadQuestion();
</script>

</body>
</html>
