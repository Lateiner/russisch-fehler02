<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Quiz-Shuffle</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --blue: #0984e3;
            --green: #27ae60;
            --red: #d63031;
            --text: #2d3436;
            --border: #dfe6e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--blue);
            transition: width 0.3s ease;
        }

        h1 { font-size: 1.5rem; color: var(--blue); margin-bottom: 10px; }
        .instruction { color: #636e72; margin-bottom: 30px; font-size: 0.95rem; }

        .active-phrase-container {
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .phrase-card {
            font-size: 1.8rem;
            font-weight: bold;
            padding: 20px 40px;
            background: #fdfdfd;
            border: 2px solid var(--blue);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(9, 132, 227, 0.1);
            /* Animation bei jeder neuen Phrase */
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .categories-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .category-box {
            padding: 25px 15px;
            border: 2px dashed var(--border);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100px;
            user-select: none;
        }

        .category-box:hover {
            border-color: var(--blue);
            background-color: #f0f7ff;
        }

        .category-box strong { font-size: 1.1rem; color: var(--blue); }
        .category-box span { font-size: 0.85rem; color: #636e72; }

        .category-box.correct { background-color: #e8f8f0; border-color: var(--green); border-style: solid; }
        .category-box.wrong { background-color: #fdf2f2; border-color: var(--red); border-style: solid; }

        #feedback-text {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .fb-success { background: #e8f8f0; border-left: 5px solid var(--green); color: #1e8449; }
        .fb-error { background: #fdf2f2; border-left: 5px solid var(--red); color: #a93226; }

        .btn-next, .btn-restart {
            margin-top: 20px;
            padding: 15px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        #result-screen { display: none; }

        @media (max-width: 480px) {
            .categories-grid { grid-template-columns: 1fr; }
            .phrase-card { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="app-container" id="quiz-ui">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h1>много oder очень?</h1>
    <p class="instruction">Tippe auf die richtige Kategorie für die Phrase.</p>

    <div class="active-phrase-container">
        <div class="phrase-card" id="active-phrase">...</div>
    </div>

    <div class="categories-grid">
        <div class="category-box" id="box-menge" onclick="checkChoice('menge')">
            <strong>Viel Menge / Dauer</strong>
            <span>(много)</span>
        </div>
        <div class="category-box" id="box-intensitaet" onclick="checkChoice('intensitaet')">
            <strong>Hoher Grad / Intensität</strong>
            <span>(очень / сильно)</span>
        </div>
    </div>

    <div id="feedback-text">
        <strong id="fb-status"></strong><br>
        <span id="fb-desc"></span>
        <button class="btn-next" onclick="loadNext()">Nächste Phrase</button>
    </div>
</div>

<div class="app-container" id="result-screen">
    <h2>Training beendet!</h2>
    <p id="score-text" style="font-size: 1.3rem; margin: 25px 0;"></p>
    <button class="btn-restart" onclick="restart()">Erneut starten</button>
</div>

<script>
    // Ursprüngliche Daten
    const originalData = [
        { phrase: "много работаю", cat: "menge", expl: "Hier zeigen wir ein großes Zeitkontingent oder eine Menge an Arbeit an." },
        { phrase: "очень люблю", cat: "intensitaet", expl: "Liebe ist ein Gefühl. Wir zeigen hier die Stärke oder den Grad des Gefühls an." },
        { phrase: "много живу в Москве", cat: "menge", expl: "Es geht um die Dauer (viele Jahre), also eine zeitliche Menge." },
        { phrase: "сильно скучаю", cat: "intensitaet", expl: "Vermissen ist ein Gefühl. „сильно“ zeigt hier die hohe Intensität an." },
        { phrase: "много читаю", cat: "menge", expl: "Man liest viele Bücher oder verbringt viel Zeit damit. Es beschreibt die Menge." },
        { phrase: "очень хочу", cat: "intensitaet", expl: "Ein Wunsch hat eine Intensität. Wir sagen „sehr wollen“, nicht „viel wollen“." },
        { phrase: "много гуляю", cat: "menge", expl: "Beschreibt die Quantität der Bewegung oder die Zeitdauer an der frischen Luft." },
        { phrase: "очень красиво", cat: "intensitaet", expl: "Schönheit ist ein Merkmal mit verschiedenen Graden. Hier nutzen wir „очень“." },
        { phrase: "много ем", cat: "menge", expl: "Beschreibt die physische Menge an Nahrung, die konsumiert wird." },
        { phrase: "сильно болит", cat: "intensitaet", expl: "Schmerz wird im Russischen oft mit „сильно“ gesteigert (Intensitätsgrad)." }
    ];

    let currentQuizData = [];
    let currentIdx = 0;
    let score = 0;
    let answered = false;

    // Hilfsfunktion: Fisher-Yates Shuffle zum Mischen
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initQuiz() {
        // Daten kopieren und mischen
        currentQuizData = shuffle([...originalData]);
        currentIdx = 0;
        score = 0;
        renderPhrase();
    }

    function renderPhrase() {
        answered = false;
        const q = currentQuizData[currentIdx];
        const phraseEl = document.getElementById('active-phrase');
        
        // Trick: Element kurz entfernen und neu einfügen, um CSS-Animation neu zu triggern
        phraseEl.style.animation = 'none';
        phraseEl.offsetHeight; /* Trigger reflow */
        phraseEl.style.animation = null; 
        
        phraseEl.innerText = q.phrase;
        
        // Reset Styles
        document.getElementById('box-menge').className = 'category-box';
        document.getElementById('box-intensitaet').className = 'category-box';
        document.getElementById('feedback-text').style.display = 'none';

        updateProgress();
    }

    function checkChoice(choice) {
        if (answered) return;
        answered = true;

        const q = currentQuizData[currentIdx];
        const isCorrect = (choice === q.cat);
        const feedbackEl = document.getElementById('feedback-text');
        const statusEl = document.getElementById('fb-status');
        const descEl = document.getElementById('fb-desc');

        if (isCorrect) {
            score++;
            statusEl.innerText = "Richtig!";
            feedbackEl.className = "fb-success";
            document.getElementById(choice === 'menge' ? 'box-menge' : 'box-intensitaet').classList.add('correct');
        } else {
            statusEl.innerText = "Nicht ganz.";
            feedbackEl.className = "fb-error";
            document.getElementById(choice === 'menge' ? 'box-menge' : 'box-intensitaet').classList.add('wrong');
            document.getElementById(q.cat === 'menge' ? 'box-menge' : 'box-intensitaet').classList.add('correct');
        }

        descEl.innerText = q.expl;
        feedbackEl.style.display = 'block';
    }

    function loadNext() {
        currentIdx++;
        if (currentIdx < currentQuizData.length) {
            renderPhrase();
        } else {
            showResults();
        }
    }

    function updateProgress() {
        const percent = (currentIdx / currentQuizData.length) * 100;
        document.getElementById('progress-fill').style.width = percent + '%';
    }

    function showResults() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = `Du hast ${score} von ${currentQuizData.length} Phrasen korrekt zugeordnet!`;
    }

    function restart() {
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        initQuiz(); // Mischt beim Neustart neu
    }

    // Initialstart
    initQuiz();
</script>

</body>
</html>
