<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: 10 häufige Fehler</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --blue: #0984e3;
            --green: #27ae60;
            --red: #d63031;
            --text: #2d3436;
            --gray: #b2bec3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #dfe6e9;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--blue);
            transition: width 0.3s ease;
        }

        h1 { font-size: 1.5rem; color: var(--blue); margin-bottom: 10px; }
        .instruction { color: #636e72; margin-bottom: 30px; }

        .sentence-display {
            font-size: 1.6rem;
            line-height: 1.4;
            margin-bottom: 40px;
            min-height: 100px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .drop-zone {
            display: inline-flex;
            align-items: center;
            min-width: 100px;
            height: 50px;
            border-bottom: 3px solid var(--blue);
            font-weight: bold;
            color: var(--blue);
            padding: 0 10px;
            justify-content: center;
        }

        .drop-zone.filled { border-bottom: none; color: var(--text); }
        .drop-zone.correct { color: var(--green); border-bottom: 3px solid var(--green); }
        .drop-zone.wrong { border-bottom: 3px solid var(--red); }

        .strike { text-decoration: line-through; color: var(--red); margin-right: 10px; }
        .correction { color: var(--green); text-decoration: none; font-weight: bold; }

        .word-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .word-pill {
            padding: 12px 20px;
            background: white;
            border: 2px solid var(--blue);
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.2s;
            user-select: none;
        }

        .word-pill:hover { background: var(--blue); color: white; }
        .word-pill.used { opacity: 0.3; cursor: default; pointer-events: none; }

        #feedback-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .fb-correct { background: #e8f8f0; border-left: 5px solid var(--green); color: #1e8449; }
        .fb-wrong { background: #fdf2f2; border-left: 5px solid var(--red); color: #a93226; }

        .btn-next, .btn-restart {
            margin-top: 20px;
            padding: 15px 30px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
        }

        #result-screen { display: none; }

        @media (max-width: 480px) {
            .sentence-display { font-size: 1.3rem; }
            .word-pill { padding: 10px 15px; font-size: 1rem; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-box">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h1>Russisch-Trainer</h1>
    <p class="instruction">Tippe auf das richtige Wort, um den Satz zu vervollständigen.</p>

    <div class="sentence-display" id="sentence-container">
        <!-- Satz wird hier generiert -->
    </div>

    <div class="word-pool" id="pool-container">
        <!-- Wörter werden hier generiert -->
    </div>

    <div id="feedback-box">
        <strong id="fb-status"></strong>
        <p id="fb-explanation" style="margin: 10px 0 0 0; line-height: 1.4;"></p>
        <button class="btn-next" onclick="nextQuestion()">Nächste Aufgabe</button>
    </div>
</div>

<div class="container" id="result-screen">
    <h2>Training beendet!</h2>
    <p id="score-text" style="font-size: 1.3rem; margin: 20px 0;"></p>
    <button class="btn-restart" onclick="restartQuiz()">Neustart</button>
</div>

<script>
    const questions = [
        {
            before: "Здравствуйте!",
            after: "вечер!",
            correct: "Добрый",
            distractors: ["и Добрый"],
            explanation: "Ira erklärt: Wir nutzen nur eine Begrüßung auf einmal. Entweder Здравствуйте oder Добрый вечер."
        },
        {
            before: "",
            after: "спасибо за помощь!",
            correct: "Большое",
            distractors: ["Очень", "Большой"],
            explanation: "Sehr danke (Очень спасибо) gibt es nicht. Das Adjektiv muss sächlich sein: большое спасибо."
        },
        {
            before: "Спасибо",
            after: "ваше видео.",
            correct: "за",
            distractors: ["для", "про"],
            explanation: "Den Grund für den Dank leiten wir mit der Präposition за plus Akkusativ ein."
        },
        {
            before: "Я ничего",
            after: "знаю.",
            correct: "не",
            distractors: ["-"],
            explanation: "Im Russischen ist die doppelte Verneinung Pflicht: Wenn du nichts (ничего) sagst, muss auch не vor dem Verb stehen."
        },
        {
            before: "Моя подруга —",
            after: ".",
            correct: "китаянка",
            distractors: ["китайская", "китайцы"],
            explanation: "Für Nationalitäten nutzen wir bei Personen bevorzugt das Substantiv (китаянка) statt des Adjektivs."
        },
        {
            before: "Я приду",
            after: "выходные.",
            correct: "в эти",
            distractors: ["в этих", "на эти"],
            explanation: "Die neutrale Form für an diesem Wochenende lautet в эти выходные."
        },
        {
            before: "Ирина, вы такая",
            after: "!",
            correct: "умная",
            distractors: ["умные", "умному"],
            explanation: "Wenn Sie eine einzelne Frau höflich mit Sie (вы) ansprechen, bleibt das Adjektiv im Singular."
        },
        {
            before: "Ирина, вы уже",
            after: "?",
            correct: "пришли",
            distractors: ["пришла", "пришлите"],
            explanation: "Achtung: Bei Verben nutzt man nach der Anrede mit вы immer den Plural, auch bei einer einzelnen Person."
        },
        {
            before: "Я",
            after: "люблю этот фильм.",
            correct: "очень",
            distractors: ["много", "большое"],
            explanation: "Gefühle verstärken wir mit sehr (очень). Viel (много) nutzt man eher für Mengen oder Zeitdauern."
        },
        {
            before: "Я говорю",
            after: ".",
            correct: "по-russki", // Dummy für Code
            correct: "по-русски",
            distractors: ["по-русский", "на русский"],
            explanation: "Adverbien, die eine Sprache beschreiben (auf welche Weise?), enden im Russischen auf -и."
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        const q = questions[currentIdx];
        const sentenceContainer = document.getElementById('sentence-container');
        const poolContainer = document.getElementById('pool-container');
        document.getElementById('feedback-box').style.display = 'none';

        sentenceContainer.innerHTML = `${q.before} <span class="drop-zone" id="gap">...</span> ${q.after}`;

        const allOptions = [q.correct, ...q.distractors.filter(d => d !== "-")].sort(() => Math.random() - 0.5);
        if(q.distractors.includes("-")) allOptions.push("-");

        poolContainer.innerHTML = '';
        allOptions.forEach(word => {
            const pill = document.createElement('div');
            pill.className = 'word-pill';
            pill.innerText = (word === "-") ? "(kein Wort)" : word;
            pill.onclick = () => fillGap(word);
            poolContainer.appendChild(pill);
        });
        updateProgress();
    }

    function fillGap(word) {
        if (answered) return;
        answered = true;

        const q = questions[currentIdx];
        const gap = document.getElementById('gap');
        const feedbackBox = document.getElementById('feedback-box');
        const status = document.getElementById('fb-status');
        const expl = document.getElementById('fb-explanation');

        document.querySelectorAll('.word-pill').forEach(p => p.classList.add('used'));

        const displayWord = (word === "-") ? "" : word;

        if (word === q.correct) {
            score++;
            gap.innerText = displayWord;
            gap.className = "drop-zone correct";
            status.innerText = "Richtig!";
            feedbackBox.className = "fb-correct";
        } else {
            gap.innerHTML = `<span class="strike">${displayWord}</span> <span class="correction">${q.correct}</span>`;
            gap.className = "drop-zone wrong";
            status.innerText = "Leider nicht korrekt.";
            feedbackBox.className = "fb-wrong";
        }

        expl.innerText = q.explanation;
        feedbackBox.style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) loadQuestion();
        else showFinal();
    }

    function updateProgress() {
        document.getElementById('progress-fill').style.width = (currentIdx / questions.length) * 100 + '%';
    }

    function showFinal() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = `Du hast ${score} von ${questions.length} Punkten erreicht!`;
    }

    function restartQuiz() {
        currentIdx = 0; score = 0;
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        loadQuestion();
    }

    loadQuestion();
</script>

</body>
</html>
