<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Stil-Sortierung</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --neutral-blue: #0984e3;
            --spoken-purple: #6c5ce7;
            --green: #27ae60;
            --red: #d63031;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #dfe6e9;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--neutral-blue);
            transition: width 0.3s ease;
        }

        h1 { font-size: 1.5rem; color: var(--text); margin-bottom: 10px; }
        .instruction { color: #636e72; margin-bottom: 30px; font-size: 0.95rem; }

        /* Anzeige der Phrase */
        .phrase-display {
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .phrase-card {
            font-size: 1.6rem;
            font-weight: bold;
            padding: 20px 30px;
            background: #fff;
            border: 2px solid #eee;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Kategorien-Boxen */
        .categories {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .category-box {
            padding: 20px 10px;
            border: 2px solid #dfe6e9;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 5px;
            user-select: none;
        }

        .category-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .box-neutral:hover { border-color: var(--neutral-blue); background: #f0f7ff; }
        .box-spoken:hover { border-color: var(--spoken-purple); background: #f5f3ff; }

        .category-box strong { font-size: 1.1rem; }
        .category-box span { font-size: 0.8rem; color: #636e72; }

        .category-box.correct { background-color: #e8f8f0; border-color: var(--green); color: #1e8449; }
        .category-box.wrong { background-color: #fdf2f2; border-color: var(--red); color: #a93226; }

        /* Feedback-Bereich */
        #feedback {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .fb-success { background: #e8f8f0; border-left: 5px solid var(--green); }
        .fb-error { background: #fdf2f2; border-left: 5px solid var(--red); }

        .btn-action {
            margin-top: 15px;
            padding: 15px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        #result-screen { display: none; }

        @media (max-width: 480px) {
            .categories { grid-template-columns: 1fr; }
            .phrase-card { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-ui">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h1>Neutral oder Umgangssprachlich?</h1>
    <p class="instruction">Ordne den Ausdruck dem richtigen Stil zu.</p>

    <div class="phrase-display">
        <div class="phrase-card" id="current-phrase">...</div>
    </div>

    <div class="categories">
        <div class="category-box box-neutral" id="btn-neutral" onclick="checkAnswer('neutral')">
            <strong style="color: var(--neutral-blue);">Neutral</strong>
            <span>(Нейтральный стиль)</span>
        </div>
        <div class="category-box box-spoken" id="btn-spoken" onclick="checkAnswer('spoken')">
            <strong style="color: var(--spoken-purple);">Umgangssprachlich</strong>
            <span>(Разговорный стиль)</span>
        </div>
    </div>

    <div id="feedback">
        <strong id="fb-status"></strong><br>
        <span id="fb-text"></span>
        <button class="btn-action" onclick="loadQuestion()">Nächste Aufgabe</button>
    </div>
</div>

<div class="container" id="result-screen">
    <h2>Ergebnis</h2>
    <p id="score-text" style="font-size: 1.3rem; margin: 25px 0;"></p>
    <button class="btn-action" onclick="restart()">Neustart</button>
</div>

<script>
    const allTasks = [
        { phrase: "в эти выходные", style: "neutral", expl: "Die Konstruktion mit der Präposition в ist der neutrale Standard." },
        { phrase: "на этих выходных", style: "spoken", expl: "Die Konstruktion mit на wird häufig in der gesprochenen Sprache (Umgangssprache) verwendet." },
        { phrase: "в следующие выходные", style: "neutral", expl: "Sowohl Schrift- als auch Bildungssprache nutzen hier bevorzugt в." },
        { phrase: "на следующих выходных", style: "spoken", expl: "Typisch für informelle Gespräche unter Freunden." },
        { phrase: "в прошлые выходные", style: "neutral", expl: "Neutraler Stil für die Beschreibung der Vergangenheit." },
        { phrase: "на прошлых выходных", style: "spoken", expl: "Umgangssprachliche Variante für das vergangene Wochenende." },
        { phrase: "в свободные выходные", style: "neutral", expl: "Der neutrale Stil folgt meist dem Muster в + Akkusativ." },
        { phrase: "на свободных выходных", style: "spoken", expl: "Der umgangssprachliche Stil folgt dem Muster на + Präpositional." }
    ];

    let currentQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let answered = false;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initQuiz() {
        currentQuestions = shuffle([...allTasks]);
        currentIdx = 0;
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIdx >= currentQuestions.length) {
            showFinal();
            return;
        }
        answered = false;
        const q = currentQuestions[currentIdx];
        document.getElementById('current-phrase').innerText = q.phrase;
        
        // Reset Styles
        document.getElementById('btn-neutral').className = 'category-box box-neutral';
        document.getElementById('btn-spoken').className = 'category-box box-spoken';
        document.getElementById('feedback').style.display = 'none';
        
        updateProgress();
    }

    function checkAnswer(userChoice) {
        if (answered) return;
        answered = true;

        const q = currentQuestions[currentIdx];
        const isCorrect = (userChoice === q.style);
        const fb = document.getElementById('feedback');
        
        if (isCorrect) {
            score++;
            document.getElementById('fb-status').innerText = "Richtig!";
            fb.className = "fb-success";
            document.getElementById(userChoice === 'neutral' ? 'btn-neutral' : 'btn-spoken').classList.add('correct');
        } else {
            document.getElementById('fb-status').innerText = "Nicht ganz.";
            fb.className = "fb-error";
            document.getElementById(userChoice === 'neutral' ? 'btn-neutral' : 'btn-spoken').classList.add('wrong');
            document.getElementById(q.style === 'neutral' ? 'btn-neutral' : 'btn-spoken').classList.add('correct');
        }

        document.getElementById('fb-text').innerText = q.expl;
        fb.style.display = 'block';
        currentIdx++;
    }

    function updateProgress() {
        const percent = (currentIdx / currentQuestions.length) * 100;
        document.getElementById('progress-fill').style.width = percent + '%';
    }

    function showFinal() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = `Du hast ${score} von ${currentQuestions.length} Ausdrücken korrekt zugeordnet!`;
    }

    function restart() {
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        initQuiz();
    }

    initQuiz();
</script>

</body>
</html>
