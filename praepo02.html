<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Präpositionen-Match</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #0984e3;
            --success: #27ae60;
            --error: #d63031;
            --text: #2d3436;
            --border: #dfe6e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 10px; }
        .instruction { color: #636e72; margin-bottom: 30px; font-size: 0.95rem; }

        /* Das aktive Wort, das zugeordnet werden muss */
        .active-word-container {
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }

        .word-card {
            font-size: 2rem;
            font-weight: bold;
            padding: 20px 40px;
            background: #fff;
            border: 3px solid var(--primary);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(9, 132, 227, 0.1);
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Die Ziel-Boxen (Präpositionen) */
        .targets-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .target-box {
            padding: 30px 10px;
            border: 3px dashed var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .target-box:hover {
            border-color: var(--primary);
            background-color: #f0f7ff;
        }

        .target-box strong {
            font-size: 2.5rem;
            color: var(--primary);
        }

        .target-box span {
            font-size: 0.9rem;
            color: #636e72;
            font-weight: 600;
        }

        /* Feedback-Zustände */
        .target-box.correct { background-color: #e8f8f0; border-color: var(--success); border-style: solid; }
        .target-box.wrong { background-color: #fdf2f2; border-color: var(--error); border-style: solid; }

        #feedback-text {
            display: none;
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.4;
            text-align: left;
        }

        .fb-success { background: #e8f8f0; border-left: 5px solid var(--success); color: #1e8449; }
        .fb-error { background: #fdf2f2; border-left: 5px solid var(--red); color: #a93226; }

        .btn-action {
            margin-top: 20px;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        #result-screen { display: none; }

        @media (max-width: 480px) {
            .targets-grid { grid-template-columns: 1fr; }
            .word-card { font-size: 1.6rem; }
            .target-box { padding: 20px 10px; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-ui">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h1>Präpositionen-Match</h1>
    <p class="instruction">Tippe auf die richtige Präposition für das Wort.</p>

    <div class="active-word-container">
        <div class="word-card" id="current-word">...</div>
    </div>

    <div class="targets-grid">
        <div class="target-box" id="box-za" onclick="handleChoice('за')">
            <strong>за</strong>
            <span>(Grund für Dank)</span>
        </div>
        <div class="target-box" id="box-iz" onclick="handleChoice('из')">
            <strong>из</strong>
            <span>(Herkunft/Ort)</span>
        </div>
    </div>

    <div id="feedback-text">
        <strong id="fb-status"></strong><br>
        <span id="fb-explanation"></span>
        <button class="btn-action" onclick="loadNext()">Nächstes Wort</button>
    </div>
</div>

<div class="container" id="result-screen">
    <h2>Ausgezeichnet!</h2>
    <p id="score-text" style="font-size: 1.3rem; margin: 25px 0;"></p>
    <button class="btn-action" onclick="restart()">Neustart</button>
</div>

<script>
    const quizData = [
        { word: "Спасибо...", prep: "за", expl: "Nach 'спасибо' nutzen wir 'за' + Akkusativ, um den Grund des Dankes zu nennen." },
        { word: "Подруга...", prep: "из", expl: "Statt Adjektive zu nutzen, sagen wir oft 'подруга из...' (Freundin aus...)." },
        { word: "Люди...", prep: "из", expl: "Herkunft von Personengruppen wird mit 'из' + Genitiv ausgedrückt." },
        { word: "Видео...", prep: "за", expl: "Wenn du dich für ein Video bedankst: 'Спасибо за видео'." },
        { word: "Помощь...", prep: "за", expl: "Dank für Hilfe: 'Спасибо за помощь'. Benutze nie 'для' an dieser Stelle." },
        { word: "Друг...", prep: "из", expl: "Herkunft einer Person: 'Друг из Германии' (Freund aus Deutschland)." },
        { word: "Книга...", prep: "за", expl: "Dank für ein Geschenk/Buch: 'Спасибо за книгу'." },
        { word: "Студент...", prep: "из", expl: "Herkunft: 'Студент из Китая' (Student aus China)." },
        { word: "Подарок...", prep: "за", expl: "Dank für ein Geschenk: 'Спасибо за подарок'." },
        { word: "Человек...", prep: "из", expl: "Ira empfiehlt 'человек из России' statt eines Adjektivs." }
    ];

    let currentQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let answered = false;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initQuiz() {
        currentQuestions = shuffle([...quizData]);
        currentIdx = 0;
        score = 0;
        renderTask();
    }

    function renderTask() {
        answered = false;
        const q = currentQuestions[currentIdx];
        const wordEl = document.getElementById('current-word');
        wordEl.innerText = q.word;

        // Reset Styles
        document.getElementById('box-za').className = 'target-box';
        document.getElementById('box-iz').className = 'target-box';
        document.getElementById('feedback-text').style.display = 'none';
        
        updateProgress();
    }

    function handleChoice(choice) {
        if (answered) return;
        answered = true;

        const q = currentQuestions[currentIdx];
        const isCorrect = (choice === q.prep);
        const fbArea = document.getElementById('feedback-text');
        const fbStatus = document.getElementById('fb-status');
        const fbExpl = document.getElementById('fb-explanation');

        if (isCorrect) {
            score++;
            fbStatus.innerText = "Richtig!";
            fbArea.className = "fb-success";
            document.getElementById(choice === 'за' ? 'box-za' : 'box-iz').classList.add('correct');
        } else {
            fbStatus.innerText = "Falsch.";
            fbArea.className = "fb-error";
            document.getElementById(choice === 'за' ? 'box-za' : 'box-iz').classList.add('wrong');
            document.getElementById(q.prep === 'за' ? 'box-za' : 'box-iz').classList.add('correct');
        }

        fbExpl.innerText = q.explanation;
        fbArea.style.display = 'block';
    }

    function loadNext() {
        currentIdx++;
        if (currentIdx < currentQuestions.length) {
            renderTask();
        } else {
            showFinal();
        }
    }

    function updateProgress() {
        const percent = (currentIdx / currentQuestions.length) * 100;
        document.getElementById('progress-fill').style.width = percent + '%';
    }

    function showFinal() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = `Du hast ${score} von ${currentQuestions.length} Begriffen korrekt zugeordnet!`;
    }

    function restart() {
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        initQuiz();
    }

    initQuiz();
</script>

</body>
</html>
