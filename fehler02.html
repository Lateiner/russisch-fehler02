<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Fehler-Spotter</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary-blue: #0984e3;
            --correct-green: #27ae60;
            --wrong-red: #d63031;
            --text-color: #2d3436;
            --shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            box-sizing: border-box;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #dfe6e9;
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary-blue);
            transition: width 0.3s ease;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: var(--primary-blue);
        }

        .instruction {
            color: #636e72;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        /* Satz-Design */
        .sentence-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            user-select: none;
        }

        .word-btn {
            padding: 8px 12px;
            font-size: 1.4rem;
            font-weight: 500;
            background: white;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        @media (hover: hover) {
            .word-btn:hover {
                border-color: var(--primary-blue);
                background: #f0f7ff;
            }
        }

        .word-btn.selected-wrong {
            background-color: #fdf2f2;
            border-color: var(--wrong-red);
            color: var(--wrong-red);
        }

        .word-btn.selected-correct {
            background-color: #e8f8f0;
            border-color: var(--correct-green);
            color: var(--correct-green);
        }

        .word-btn:disabled {
            cursor: default;
        }

        /* Feedback-Bereich */
        #feedback-area {
            display: none;
            text-align: left;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-success { background: #e8f8f0; border-left: 5px solid var(--correct-green); }
        .feedback-error { background: #fdf2f2; border-left: 5px solid var(--wrong-red); }

        .btn-next, .btn-restart {
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        #result-screen { display: none; }

        @media (max-width: 480px) {
            .word-btn { font-size: 1.1rem; padding: 10px 14px; }
            .game-container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="game-container" id="game-container">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h1>Fehler-Spotter</h1>
    <p class="instruction">Klicke auf das falsche Wort im Satz!</p>

    <div class="sentence-display" id="sentence-box">
        <!-- Wörter werden hier als Buttons eingefügt -->
    </div>

    <div id="feedback-area">
        <strong id="feedback-title"></strong>
        <p id="feedback-text" style="margin: 10px 0; font-size: 0.95rem; line-height: 1.4;"></p>
        <button class="btn-next" onclick="loadNextQuestion()">Nächste Frage</button>
    </div>
</div>

<div class="game-container" id="result-screen">
    <h2>Training abgeschlossen!</h2>
    <p id="final-score" style="font-size: 1.2rem; margin: 20px 0;"></p>
    <button class="btn-restart" onclick="restartGame()">Training neu starten</button>
</div>

<script>
    const quizData = [
        {
            sentence: ["Здравствуйте!", "Добрый", "вечер!"],
            errorIndex: 1, // "Добрый"
            explanation: "Ira sagt: Nutze nur eine Begrüßung. Entweder Здравствуйте oder Добрый вечер, aber nicht beides nacheinander."
        },
        {
            sentence: ["Это", "очень", "спасибо", "вам."],
            errorIndex: 1, // "очень"
            explanation: "Sehr danke gibt es nicht. Verwende stattdessen большое спасибо (vielen Dank)."
        },
        {
            sentence: ["Большой", "спасибо", "за", "помощь."],
            errorIndex: 0, // "Большой"
            explanation: "Das Wort спасибо ist sächlich. Deshalb muss es большое (Endung -ое) heißen."
        },
        {
            sentence: ["Спасибо", "для", "этого", "видео."],
            errorIndex: 1, // "для"
            explanation: "Nach спасибо folgt immer die Präposition за für den Grund des Dankes."
        },
        {
            sentence: ["Я", "ничего", "знаю", "об", "этом."],
            errorIndex: 2, // "знаю"
            explanation: "Hier fehlt das Wort не. Bei Wörtern wie nichts (ничего) muss im Russischen zwingend ein zweites не vor das Verb."
        },
        {
            sentence: ["Моя", "китайская", "подruга", "пришла."],
            errorIndex: 1, // "китайская"
            explanation: "Muttersprachler sagen eher подруга-китаянка oder подруга из Китая statt des Adjektivs."
        },
        {
            sentence: ["В", "этих", "выходных", "я", "занят."],
            errorIndex: 1, // "этих"
            explanation: "Die neutrale Form für dieses Wochenende ist в эти выходные."
        },
        {
            sentence: ["Ирина,", "вы", "очень", "умные!"],
            errorIndex: 3, // "умные"
            explanation: "Wenn Sie eine einzelne Person höflich mit вы ansprechen, bleibt das Adjektiv im Singular: умная."
        },
        {
            sentence: ["Я", "много", "люблю", "этот", "канал."],
            errorIndex: 1, // "много"
            explanation: "Gefühle werden mit sehr (очень) verstärkt. Viel (много) bezieht sich auf Mengen oder Zeit."
        },
        {
            sentence: ["Урок", "о", "русском", "по-русский."],
            errorIndex: 3, // "по-русский"
            explanation: "Adverbien für Sprachen enden auf -и. Es heißt korrekt по-русски."
        }
    ];

    let currentIndex = 0;
    let score = 0;
    let answered = false;

    function initGame() {
        answered = false;
        const currentData = quizData[currentIndex];
        const sentenceBox = document.getElementById('sentence-box');
        const feedbackArea = document.getElementById('feedback-area');
        
        sentenceBox.innerHTML = '';
        feedbackArea.style.display = 'none';

        currentData.sentence.forEach((word, index) => {
            const btn = document.createElement('button');
            btn.className = 'word-btn';
            btn.innerText = word;
            btn.onclick = () => handleWordClick(index);
            sentenceBox.appendChild(btn);
        });

        updateProgress();
    }

    function handleWordClick(clickedIndex) {
        if (answered) return;
        answered = true;

        const currentData = quizData[currentIndex];
        const buttons = document.querySelectorAll('.word-btn');
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');

        // Buttons deaktivieren
        buttons.forEach(btn => btn.disabled = true);

        if (clickedIndex === currentData.errorIndex) {
            score++;
            buttons[clickedIndex].classList.add('selected-correct');
            feedbackTitle.innerText = "Richtig gefunden!";
            feedbackArea.className = "feedback-area feedback-success";
        } else {
            buttons[clickedIndex].classList.add('selected-wrong');
            buttons[currentData.errorIndex].classList.add('selected-correct');
            feedbackTitle.innerText = "Leider daneben.";
            feedbackArea.className = "feedback-area feedback-error";
        }

        feedbackText.innerText = currentData.explanation;
        feedbackArea.style.display = 'block';
    }

    function loadNextQuestion() {
        currentIndex++;
        if (currentIndex < quizData.length) {
            initGame();
        } else {
            showFinalResults();
        }
    }

    function updateProgress() {
        const percent = (currentIndex / quizData.length) * 100;
        document.getElementById('progress-fill').style.width = percent + '%';
    }

    function showFinalResults() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `Du hast ${score} von ${quizData.length} Fehlern korrekt erkannt.`;
    }

    function restartGame() {
        currentIndex = 0;
        score = 0;
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        initGame();
    }

    // Start
    initGame();
</script>

</body>
</html>
