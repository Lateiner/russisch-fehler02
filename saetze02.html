<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Dropdown-Sätze</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #0984e3;
            --success: #27ae60;
            --error: #d63031;
            --text: #2d3436;
            --border: #dfe6e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            box-sizing: border-box;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.4s ease;
        }

        h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 10px; }

        /* Satz-Design */
        .sentence-box {
            font-size: 1.6rem;
            line-height: 2.2;
            margin: 40px 0;
            padding: 20px;
            background: #fdfdfd;
            border-radius: 12px;
            border: 1px solid #f0f0f0;
            word-wrap: break-word;
        }

        /* Dropdown Styling */
        .inline-select {
            font-size: 1.3rem;
            font-family: inherit;
            padding: 5px 10px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            background-color: white;
            color: var(--text);
            cursor: pointer;
            outline: none;
            margin: 0 5px;
            transition: all 0.2s;
        }

        .inline-select:hover { background-color: #f0f7ff; }

        .inline-select.correct { border-color: var(--success); background-color: #e8f8f0; color: #1e8449; }
        .inline-select.wrong { border-color: var(--error); background-color: #fdf2f2; color: #a93226; }

        .inline-select:disabled { opacity: 1; cursor: default; }

        /* Feedback-Bereich */
        #feedback {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fb-success { background: #e8f8f0; border-left: 5px solid var(--success); color: #1e8449; }
        .fb-error { background: #fdf2f2; border-left: 5px solid var(--error); color: #a93226; }

        .btn-action {
            margin-top: 20px;
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        #result-screen { display: none; }

        @media (max-width: 480px) {
            .sentence-box { font-size: 1.3rem; padding: 15px; }
            .inline-select { font-size: 1.1rem; padding: 4px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-box">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h1 id="title">Wähle die richtige Form</h1>
    
    <div class="sentence-box" id="sentence-container">
        <!-- Satz mit Dropdown wird hier geladen -->
    </div>

    <div id="feedback">
        <strong id="fb-status"></strong>
        <p id="fb-explanation" style="margin: 10px 0 0 0; line-height: 1.5; font-size: 0.95rem;"></p>
        <button class="btn-action" onclick="nextQuestion()">Nächste Aufgabe</button>
    </div>
</div>

<div class="container" id="result-screen">
    <h2>Training abgeschlossen!</h2>
    <p id="score-text" style="font-size: 1.3rem; margin: 25px 0;"></p>
    <button class="btn-action" onclick="restartQuiz()">Neustart</button>
</div>

<script>
    const questions = [
        {
            before: "Здравствуйте!",
            after: "вечер!",
            options: ["Добрый", "и Добрый"],
            correct: "Добрый",
            explanation: "Ira sagt: Wir wählen entweder Здравствуйте oder Добрый вечер. Die Kombination beider Formeln hintereinander ist im Russischen unüblich."
        },
        {
            before: "Огромное",
            after: "за помощь!",
            options: ["спасибо", "спасибо для"],
            correct: "спасибо",
            explanation: "Nach dem Wort danke (спасибо) nutzen wir die Präposition за + Akkusativ. Die Form „спасибо для“ ist falsch."
        },
        {
            before: "Большое",
            after: "!",
            options: ["спасибо", "спасиба"],
            correct: "спасибо",
            explanation: "Vielen Dank heißt auf Russisch „большое спасибо“. Da das Wort спасибо sächlich ist, muss auch das Adjektiv auf -ое enden."
        },
        {
            before: "Я ничего",
            after: "знаю.",
            options: ["не", "---"],
            correct: "не",
            explanation: "Im Russischen brauchen wir die doppelte Verneinung. Wenn du nichts (ничего) sagst, muss auch die Partikel не vor dem Verb stehen."
        },
        {
            before: "Моя подруга —",
            after: ".",
            options: ["китаянка", "китайская"],
            correct: "китаянка",
            explanation: "Muttersprachler bezeichnen Personen bevorzugt mit dem Substantiv der Nationalität (китаянка) statt mit dem Adjektiv."
        },
        {
            before: "В",
            after: "выходные я свободна.",
            options: ["эти", "этих"],
            correct: "эти",
            explanation: "Die neutrale Form für „an diesem Wochenende“ lautet в эти выходные."
        },
        {
            before: "Ирина, вы такая",
            after: "!",
            options: ["умная", "умные"],
            correct: "умная",
            explanation: "Sprechen wir eine Einzelperson höflich mit Sie (вы) an, bleibt das Adjektiv im Singular (умная)."
        },
        {
            before: "Ирина, вы уже",
            after: "?",
            options: ["пришли", "пришла"],
            correct: "пришли",
            explanation: "Bei Verben nutzt man nach der Anrede mit Sie (вы) immer den Plural, auch wenn nur eine Person gemeint ist."
        },
        {
            before: "Я",
            after: "люблю этот фильм.",
            options: ["очень", "много"],
            correct: "очень",
            explanation: "Gefühle werden mit sehr (очень) gesteigert. Viel (много) bezieht sich auf Mengen oder Zeitspannen."
        },
        {
            before: "Я говорю",
            after: ".",
            options: ["по-русски", "по-русский"],
            correct: "по-русски",
            explanation: "Adverbien, die Sprachen bezeichnen (wie?), enden im Russischen auf -и. Zum Beispiel: по-русски."
        }
    ];

    let currentIdx = 0;
    let score = 0;

    function renderQuestion() {
        const q = questions[currentIdx];
        const container = document.getElementById('sentence-container');
        
        const optionsHTML = `
            <select class="inline-select" id="user-select" onchange="checkAnswer()">
                <option value="" disabled selected>...</option>
                ${q.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
            </select>
        `;

        container.innerHTML = `${q.before} ${optionsHTML} ${q.after}`;
        document.getElementById('feedback').style.display = 'none';
        updateProgress();
    }

    function checkAnswer() {
        const q = questions[currentIdx];
        const select = document.getElementById('user-select');
        const userValue = select.value;
        const fb = document.getElementById('feedback');
        const fbStatus = document.getElementById('fb-status');
        const fbExpl = document.getElementById('fb-explanation');

        select.disabled = true;

        if (userValue === q.correct) {
            score++;
            fbStatus.innerText = "Richtig!";
            fb.className = "fb-success";
            select.classList.add('correct');
        } else {
            fbStatus.innerText = "Nicht ganz korrekt.";
            fb.className = "fb-error";
            select.classList.add('wrong');
        }

        fbExpl.innerText = q.explanation;
        fb.style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            renderQuestion();
        } else {
            showFinal();
        }
    }

    function updateProgress() {
        const percent = (currentIdx / questions.length) * 100;
        document.getElementById('progress-fill').style.width = percent + '%';
    }

    function showFinal() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = `Du hast ${score} von ${questions.length} Aufgaben korrekt gelöst!`;
    }

    function restartQuiz() {
        currentIdx = 0;
        score = 0;
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        renderQuestion();
    }

    // Initialisierung
    renderQuestion();
</script>

</body>
</html>
