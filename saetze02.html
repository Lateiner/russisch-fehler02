<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Dropdown-Sätze</title>
    <style>
        :root {
            --bg: #f4f7f9;
            --card: #ffffff;
            --blue: #0984e3;
            --green: #27ae60;
            --red: #d63031;
            --text: #2d3436;
            --border: #dfe6e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--blue);
            transition: width 0.3s ease;
        }

        h1 { font-size: 1.5rem; color: var(--blue); margin-bottom: 15px; }

        .sentence-box {
            font-size: 1.5rem;
            line-height: 1.8;
            margin: 30px 0;
            padding: 20px;
            background: #fafafa;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        /* Styling für das Dropdown im Satz */
        select {
            font-size: 1.2rem;
            font-family: inherit;
            padding: 5px 10px;
            border: 2px solid var(--blue);
            border-radius: 8px;
            background: white;
            color: var(--text);
            cursor: pointer;
            outline: none;
            margin: 0 5px;
            transition: border-color 0.2s;
        }

        select:focus { border-color: #0773c5; }
        
        select.correct-choice { border-color: var(--green); background-color: #e8f8f0; color: #1e8449; }
        select.wrong-choice { border-color: var(--red); background-color: #fdf2f2; color: #a93226; }

        select:disabled { opacity: 1; cursor: default; }

        #feedback {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fb-correct { background: #e8f8f0; border-left: 5px solid var(--green); color: #1e8449; }
        .fb-wrong { background: #fdf2f2; border-left: 5px solid var(--red); color: #a93226; }

        .btn-action {
            margin-top: 20px;
            padding: 15px 30px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn-action:hover { background: #0773c5; }

        #result-screen { display: none; }

        @media (max-width: 480px) {
            .sentence-box { font-size: 1.2rem; }
            select { font-size: 1.1rem; padding: 4px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-box">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h1>Russisch-Trainer</h1>
    <p>Wähle die richtige Option im Satz aus.</p>

    <div class="sentence-box" id="sentence-container">
        <!-- Satz mit Dropdown wird hier geladen -->
    </div>

    <div id="feedback">
        <strong id="fb-status"></strong>
        <p id="fb-explanation" style="margin: 10px 0 0 0; line-height: 1.4; font-size: 0.95rem;"></p>
        <button class="btn-action" onclick="nextQuestion()">Nächste Aufgabe</button>
    </div>
</div>

<div class="container" id="result-screen">
    <h2>Training beendet!</h2>
    <p id="score-text" style="font-size: 1.3rem; margin: 20px 0;"></p>
    <button class="btn-action" onclick="restartQuiz()">Neustart</button>
</div>

<script>
    const questions = [
        {
            before: "Здравствуйте!",
            after: "вечер!",
            options: ["Добрый", "и Добрый"],
            correct: "Добрый",
            explanation: "Ira erklärt: Wir nutzen nur eine Begrüßung auf einmal. Entweder Здравствуйте oder Добрый вечер."
        },
        {
            before: "",
            after: "спасибо за видео.",
            options: ["Очень", "Большое"],
            correct: "Большое",
            explanation: "Sehr danke (Очень спасибо) gibt es nicht. Das Adjektiv muss im Neutrum stehen: большое спасибо."
        },
        {
            before: "Спасибо",
            after: "эту книгу.",
            options: ["для", "за"],
            correct: "за",
            explanation: "Nach dem Wort спасибо verwenden wir die Präposition за für den Grund des Dankes."
        },
        {
            before: "Я ничего",
            after: "знаю.",
            options: ["не", "(kein Wort)"],
            correct: "не",
            explanation: "Im Russischen brauchen wir die doppelte Verneinung. Wenn du nichts (ничего) sagst, muss auch не vor dem Verb stehen."
        },
        {
            before: "Моя подруга —",
            after: ".",
            options: ["китаянка", "китайская"],
            correct: "китаянка",
            explanation: "Muttersprachler bezeichnen Personen mit dem Substantiv der Nationalität (китаянка) statt mit dem Adjektiv."
        },
        {
            before: "В",
            after: "выходные я отдыхаю.",
            options: ["эти", "этих"],
            correct: "эти",
            explanation: "Die neutrale Form für „an diesem Wochenende“ lautet в эти выходные."
        },
        {
            before: "Ирина, вы такая",
            after: "!",
            options: ["умная", "умные"],
            correct: "умная",
            explanation: "Sprechen wir eine Einzelperson höflich mit вы an, bleibt das Adjektiv im Singular (умная)."
        },
        {
            before: "Ирина, вы уже",
            after: "?",
            options: ["пришла", "пришли"],
            correct: "пришли",
            explanation: "Bei Verben nutzt man nach der Anrede mit Sie (вы) immer den Plural, auch bei einer einzelnen Person."
        },
        {
            before: "Я",
            after: "люблю этот фильм.",
            options: ["очень", "много"],
            correct: "очень",
            explanation: "Gefühle werden mit sehr (очень) gesteigert. Viel (много) bezieht sich auf Mengen oder Zeitspannen."
        },
        {
            before: "Я говорю",
            after: ".",
            options: ["по-русски", "по-русский"],
            correct: "по-русски",
            explanation: "Adverbien, die Sprachen bezeichnen (wie?), enden im Russischen auf -и."
        }
    ];

    let currentIdx = 0;
    let score = 0;

    function loadQuestion() {
        const q = questions[currentIdx];
        const container = document.getElementById('sentence-container');
        
        // Menü generieren
        let selectHTML = `<select id="user-select" onchange="checkAnswer()">
            <option value="" disabled selected>...</option>
            ${q.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
        </select>`;

        container.innerHTML = `${q.before} ${selectHTML} ${q.after}`;
        document.getElementById('feedback').style.display = 'none';
        updateProgress();
    }

    function checkAnswer() {
        const q = questions[currentIdx];
        const select = document.getElementById('user-select');
        const userValue = select.value;
        const fb = document.getElementById('feedback');
        const status = document.getElementById('fb-status');
        const expl = document.getElementById('fb-explanation');

        select.disabled = true;

        if (userValue === q.correct) {
            score++;
            status.innerText = "Richtig!";
            fb.className = "fb-correct";
            select.classList.add('correct-choice');
        } else {
            status.innerText = "Leider nicht.";
            fb.className = "fb-wrong";
            select.classList.add('wrong-choice');
        }

        expl.innerText = q.explanation;
        fb.style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showFinal();
        }
    }

    function updateProgress() {
        document.getElementById('progress-fill').style.width = (currentIdx / questions.length) * 100 + '%';
    }

    function showFinal() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = `Du hast ${score} von ${questions.length} Aufgaben korrekt gelöst!`;
    }

    function restartQuiz() {
        currentIdx = 0; score = 0;
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        loadQuestion();
    }

    loadQuestion();
</script>

</body>
</html>
