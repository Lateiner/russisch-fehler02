<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: бы-Zählanalyse</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --card: #ffffff;
            --primary: #6c5ce7;
            --success: #27ae60;
            --error: #d63031;
            --text: #2d3436;
            --light-gray: #f1f2f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--light-gray);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        h1 { font-size: 1.5rem; color: var(--primary); margin: 0 0 10px 0; }
        .instruction { color: #636e72; font-size: 0.95rem; margin-bottom: 30px; }

        /* Satz-Display */
        .sentence-box {
            background: var(--light-gray);
            padding: 25px 15px;
            border-radius: 15px;
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 35px;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 500;
        }

        .placeholder {
            color: var(--primary);
            font-weight: bold;
            background: #e8e6ff;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 4px;
        }

        /* Buttons */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .count-btn {
            padding: 20px;
            background: white;
            border: 2px solid var(--primary);
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            transition: all 0.2s;
        }

        .count-btn:hover {
            background: var(--primary);
            color: white;
        }

        .count-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        /* Feedback */
        #feedback {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .fb-success { background: #e8f8f0; border-left: 5px solid var(--success); }
        .fb-error { background: #fdf2f2; border-left: 5px solid var(--error); }

        .btn-action {
            margin-top: 15px;
            padding: 15px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        #result-screen { display: none; }

        @media (max-width: 480px) {
            .btn-group { grid-template-columns: 1fr; }
            .sentence-box { font-size: 1.2rem; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-ui">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h1>Die бы-Zählanalyse</h1>
    <p class="instruction">Wie oft muss „бы“ in diesen Satz eingebaut werden?</p>

    <div class="sentence-box" id="sentence-container">
        <!-- Satz wird hier geladen -->
    </div>

    <div class="btn-group">
        <button class="count-btn" onclick="checkChoice(1)">1-mal бы</button>
        <button class="count-btn" onclick="checkChoice(2)">2-mal бы</button>
    </div>

    <div id="feedback">
        <strong id="fb-status"></strong><br>
        <p id="fb-text" style="margin: 8px 0 0 0; line-height: 1.5; font-size: 0.95rem;"></p>
        <button class="btn-action" onclick="nextQuestion()">Nächster Satz</button>
    </div>
</div>

<div class="container" id="result-screen">
    <h2>Training abgeschlossen!</h2>
    <p id="score-text" style="font-size: 1.3rem; margin: 25px 0;"></p>
    <button class="btn-action" onclick="restart()">Erneut starten</button>
</div>

<script>
    const questions = [
        {
            sentence: "Если <span class='placeholder'>...</span> я выиграла миллион, я <span class='placeholder'>...</span> купила самолёт.",
            correctCount: 2,
            explanation: "Dies ist eine irreale Bedingung (Wenn-dann). Im Russischen muss in beiden Satzteilen ein „бы“ stehen."
        },
        {
            sentence: "Не могли <span class='placeholder'>...</span> вы мне помочь?",
            correctCount: 1,
            explanation: "Dies ist eine höfliche Bitte. Hier verwenden wir das „бы“ nur einmal."
        },
        {
            sentence: "Если <span class='placeholder'>...</span> я была тобой, я <span class='placeholder'>...</span> не уволилась.",
            correctCount: 2,
            explanation: "Ein klassischer Bedingungssatz: Zwei Satzteile, zwei Mal „бы“."
        },
        {
            sentence: "Вы не подсказали <span class='placeholder'>...</span> , где метро?",
            correctCount: 1,
            explanation: "Eine höfliche Frage an einen Fremden. Einmal „бы“ reicht aus."
        },
        {
            sentence: "Если <span class='placeholder'>...</span> погода была хорошей, мы <span class='placeholder'>...</span> пошли гулять.",
            correctCount: 2,
            explanation: "Irreale Bedingung in der Vergangenheit: „бы“ muss in beide Teile des Satzes."
        },
        {
            sentence: "Я <span class='placeholder'>...</span> хотел попросить вас об услуге.",
            correctCount: 1,
            explanation: "Ein höflich geäußerter Wunsch. Hier wird nur ein „бы“ benötigt."
        },
        {
            sentence: "Если <span class='placeholder'>...</span> я умел петь, я <span class='placeholder'>...</span> стал певцом.",
            correctCount: 2,
            explanation: "Bedingungssatz: Zwei Mal „бы“ ist hier obligatorisch."
        },
        {
            sentence: "Вы не могли <span class='placeholder'>...</span> передать мне соль?",
            correctCount: 1,
            explanation: "Höfliche Bitte am Tisch. Nur ein „бы“ verwenden."
        },
        {
            sentence: "На вашем месте я <span class='placeholder'>...</span> поступил <span class='placeholder'>...</span> так же.",
            correctCount: 2,
            explanation: "Auch ohne ein explizites „Wenn“ ist dies ein Bedingungssatz (An deiner Stelle...). Es braucht zwei „бы“."
        },
        {
            sentence: "Я <span class='placeholder'>...</span> с радостью вам помог.",
            correctCount: 1,
            explanation: "Ein höfliches Angebot oder Wunsch. Nur einmal „бы“."
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    let shuffledQuestions = [];

    function initQuiz() {
        shuffledQuestions = shuffle([...questions]);
        currentIdx = 0;
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        const q = shuffledQuestions[currentIdx];
        document.getElementById('sentence-container').innerHTML = q.sentence;
        document.getElementById('feedback').style.display = 'none';
        
        document.querySelectorAll('.count-btn').forEach(btn => btn.disabled = false);
        updateProgress();
    }

    function checkChoice(userChoice) {
        if (answered) return;
        answered = true;

        const q = shuffledQuestions[currentIdx];
        const isCorrect = (userChoice === q.correctCount);
        const fb = document.getElementById('feedback');
        
        document.querySelectorAll('.count-btn').forEach(btn => btn.disabled = true);

        if (isCorrect) {
            score++;
            document.getElementById('fb-status').innerText = "Richtig!";
            fb.className = "fb-success";
        } else {
            document.getElementById('fb-status').innerText = "Falsch.";
            fb.className = "fb-error";
        }

        document.getElementById('fb-text').innerText = q.explanation;
        fb.style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < shuffledQuestions.length) {
            loadQuestion();
        } else {
            showFinal();
        }
    }

    function updateProgress() {
        const percent = (currentIdx / shuffledQuestions.length) * 100;
        document.getElementById('progress-fill').style.width = percent + '%';
    }

    function showFinal() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = `Du hast ${score} von ${shuffledQuestions.length} Sätzen korrekt analysiert!`;
    }

    function restart() {
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        initQuiz();
    }

    initQuiz();
</script>

</body>
</html>
